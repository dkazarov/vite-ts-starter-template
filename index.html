<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <title>vite-ts-starter-template</title>
  </head>
  <body>
    <div class="header">
      <div class="header__inner">
        <img class="logo" src="./src/assets/typescript.svg" alt="logo" />

        <nav>
          <ul class="nav__list">
            <div class="header__item">
              <a class="header__item-link" href="#">Link</a>
            </div>
            <div class="header__item">
              <a class="header__item-link" href="#">Link</a>
            </div>
          </ul>
        </nav>

        <search class="search">
          <img
            class="search__icon"
            width="24px"
            src="./src/assets/search-icon-white.svg"
            height="24px"
            alt="search"
          />
          <input class="search__input" type="text" placeholder="Search" />
        </search>

        <div class="burger">
          <button class="burger__btn">
            <span class="burger__span"></span>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
