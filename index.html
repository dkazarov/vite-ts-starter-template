<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <title>vite-ts-starter-template</title>
  </head>
  <body>
    <div class="header">
      <div class="header__inner">
        <img class="logo header__logo" width="48px" height="48px" src="./src/assets/typescript.svg" alt="logo" />

        <nav class="header__nav">
          <ul class="header__nav-list">
            <div class="header__item">
              <a class="header__item-link" href="#">Link</a>
            </div>
            <div class="header__item">
              <a class="header__item-link" href="#">Link</a>
            </div>
          </ul>
        </nav>

        <search class="search">
          <form class="search__form">
            <input class="search__input" type="text" placeholder="Search" />
            <button class="clear__input--search clear__input btn--reset" type="reset">&#10005;</button>
            <img class="search__icon" width="28px" height="28px" src="./src/assets/search-icon-white.svg" alt="search" />
          </form>
        </search>

        <button class="burger btn--reset">
          <span class="burger__center-line"></span>
        </button>

      </div>
    </div>

    <script type="module" src="/src/js/main.ts"></script>
  </body>
</html>
